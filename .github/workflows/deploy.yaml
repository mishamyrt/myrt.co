name: Deploy production

on:
  push:
    branches:
      - master

env:
  IMAGE: ghcr.io/mishamyrt/myrt.co/site

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment:
      name: Production
      url: https://myrt.co
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute date tag
        id: tag
        run: echo "date=$(date +'%Y.%m.%d')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tag.outputs.date }}

      - name: Run deploy playbook
        uses: dawidd6/action-ansible-playbook@v9
        with:
          playbook: deploy/playbook.yaml
          key: ${{secrets.SSH_PRIVATE_KEY}}
          options: |
            --inventory deploy/hosts.yaml
            --extra-vars target=production
            --extra-vars image_tag=${{ steps.tag.outputs.date }}
            --extra-vars registry_username=${{ github.actor }}
            --extra-vars registry_token=${{ secrets.GITHUB_TOKEN }}
            --verbose
